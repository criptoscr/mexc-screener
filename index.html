<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="theme-color" content="#0d1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="MEXC Scan"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>MEXC Futures Screener</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg:     #0d1117;
      --bg2:    #161b22;
      --bg3:    #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --green:  #3fb950;
      --red:    #f85149;
      --yellow: #d29922;
      --text:   #e6edf3;
      --muted:  #8b949e;
      --mono:   'JetBrains Mono', monospace;
      --sans:   'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; min-height: 100dvh; overscroll-behavior: none; }

    /* HEADER */
    .header { position: sticky; top: 0; z-index: 50; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 12px 0; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .logo { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--accent); }
    .logo span { color: var(--muted); font-weight: 400; }
    .conn { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.ok  { background: var(--green); box-shadow: 0 0 5px var(--green); animation: blink 2s infinite; }
    .dot.err { background: var(--red); }
    .dot.scan { background: var(--yellow); animation: blink .8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* FILTERS */
    .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-bottom: 10px; }
    .fb { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
    .ft { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--accent); margin-bottom: 6px; }
    .fr { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .fr:last-child { margin-bottom: 0; }
    .fl { font-size: 10px; color: var(--muted); width: 26px; flex-shrink: 0; }
    select.fi, input.fi {
      background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text); font-family: var(--mono); font-size: 11px;
      padding: 3px 5px; flex: 1; min-width: 0;
    }
    select.fi:focus, input.fi:focus { outline: none; border-color: var(--accent); }

    /* ACTION */
    .action { display: flex; gap: 8px; align-items: center; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .btn {
      flex: 1; background: var(--accent); color: #000; border: none;
      border-radius: 7px; font-family: var(--sans); font-weight: 700;
      font-size: 13px; padding: 9px; cursor: pointer; transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn.stop { background: var(--red); color: #fff; }
    .chips { display: flex; gap: 5px; }
    .chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 5px; font-family: var(--mono); font-size: 10px; padding: 4px 7px; white-space: nowrap; }
    .chip b { color: var(--accent); }

    /* COUNTDOWN */
    .cbar { height: 2px; background: var(--border); }
    .cfill { height: 2px; background: var(--accent); width: 0%; transition: width .9s linear; }

    /* TABLE */
    .tw { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); }
    thead th {
      background: var(--bg2); border-bottom: 2px solid var(--border);
      padding: 8px 10px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px; color: var(--muted);
      cursor: pointer; white-space: nowrap; user-select: none; text-align: left;
    }
    thead th.s { color: var(--accent); }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 12px; }
    tr:active td { background: var(--bg3); }
    tr.fg td { animation: fg .5s ease; }
    tr.fr2 td { animation: fr2 .5s ease; }
    @keyframes fg  { 0%{background:rgba(63,185,80,.18)} 100%{background:transparent} }
    @keyframes fr2 { 0%{background:rgba(248,81,73,.18)} 100%{background:transparent} }

    .sym { font-weight: 700; font-size: 13px; }
    .su  { font-size: 10px; color: var(--muted); }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--muted); }
    .hdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    /* PLACEHOLDER */
    .ph { text-align: center; padding: 60px 20px; color: var(--muted); font-family: var(--sans); }
    .ph .i { font-size: 36px; margin-bottom: 12px; }
    .ph p { font-size: 13px; line-height: 1.7; }
    .sp { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* SHEET */
    .ov { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: none; align-items: flex-end; }
    .ov.open { display: flex; }
    .sh { background: var(--bg2); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 14px 16px 28px; width: 100%; animation: up .25s ease; }
    @keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .sh-hnd { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
    .sh-sym { font-family: var(--mono); font-size: 20px; font-weight: 700; margin-bottom: 14px; }
    .sh-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .si { background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
    .sl { font-size: 10px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .sv { font-family: var(--mono); font-size: 15px; font-weight: 700; }
    .sh-cls { width: 100%; margin-top: 12px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 11px; font-family: var(--sans); font-weight: 600; font-size: 14px; cursor: pointer; }

    /* TOAST */
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; font-family: var(--mono); font-size: 12px; transition: transform .3s cubic-bezier(.17,.67,.41,1.1); z-index: 999; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">MEXC<span>scan</span></div>
    <div class="conn"><div class="dot" id="dot"></div><span id="ctxt">ожидание</span></div>
  </div>
  <div class="filters">
    <!-- Сделки -->
    <div class="fb">
      <div class="ft">📊 Сделки</div>
      <div class="fr"><span class="fl">Период</span>
        <select class="fi" id="tfT">
          <option value="1">1 мин</option>
          <option value="3">3 мин</option>
          <option value="5" selected>5 мин</option>
          <option value="15">15 мин</option>
        </select>
      </div>
      <div class="fr"><span class="fl">Мин</span>
        <input class="fi" id="minT" type="number" value="50" min="0"/>
      </div>
    </div>
    <!-- Оборот -->
    <div class="fb">
      <div class="ft">💰 Оборот $</div>
      <div class="fr"><span class="fl">Период</span>
        <select class="fi" id="tfV">
          <option value="1">1 мин</option>
          <option value="3">3 мин</option>
          <option value="5" selected>5 мин</option>
          <option value="15">15 мин</option>
        </select>
      </div>
      <div class="fr"><span class="fl">Мин</span>
        <input class="fi" id="minV" type="number" value="100" min="0"/>
        <span style="font-size:10px;color:var(--muted)">K$</span>
      </div>
    </div>
  </div>
</div>

<div class="action">
  <button class="btn" id="btnS" onclick="toggleScan()">▶ Запустить сканер</button>
  <div class="chips">
    <div class="chip">Всего:<b id="cTot">—</b></div>
    <div class="chip">Найдено:<b id="cFnd">—</b></div>
  </div>
</div>
<div class="cbar"><div class="cfill" id="cf"></div></div>

<div class="tw">
  <table>
    <thead>
      <tr>
        <th id="th-sym"  onclick="sort('sym')">Монета</th>
        <th id="th-trades" onclick="sort('trades')" class="s">Сделки ↓</th>
        <th id="th-volume" onclick="sort('volume')">Оборот $</th>
        <th id="th-change" onclick="sort('change')">Изм 24%</th>
      </tr>
    </thead>
    <tbody id="tb">
      <tr><td colspan="4"><div class="ph"><div class="i">📡</div><p>Настройте фильтры и нажмите<br/><b>▶ Запустить сканер</b></p></div></td></tr>
    </tbody>
  </table>
</div>

<div class="ov" id="ov" onclick="closeSheet(event)">
  <div class="sh">
    <div class="sh-hnd"></div>
    <div class="sh-sym" id="shSym"></div>
    <div class="sh-grid" id="shGrid"></div>
    <button class="sh-cls" onclick="closeSheet()">Закрыть</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];
const BASE = 'https://contract.mexc.com';
const TICK = 30;

const S = {
  on: false, symbols: [], data: {},
  sKey: 'trades', sDir: -1,
  pIdx: 0, cd: TICK, cdT: null,
};

// ── UTILS ────────────────────────────────────────────────────────────────────
const fmt = (n,d=0) => n==null?'—':n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':n.toFixed(d);
const fmtP = p => !p?'—':p>=10000?p.toFixed(0):p>=1?p.toFixed(3):p>=.01?p.toFixed(5):p.toFixed(8);
function toast(m,ms=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),ms);}
function conn(s){
  const d=document.getElementById('dot'),t=document.getElementById('ctxt');
  d.className='dot '+(s==='ok'?'ok':s==='err'?'err':s==='scan'?'scan':'');
  t.textContent=s==='ok'?'подключено':s==='err'?'ошибка':s==='scan'?'сканирование...':'ожидание';
}

// ── FETCH ────────────────────────────────────────────────────────────────────
async function ft(url,ms=6000){
  const c=new AbortController(),t=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(t);return r;}
  catch(e){clearTimeout(t);throw e;}
}
async function api(path){
  const url=BASE+path;
  try{const r=await ft(url,4000);if(r.ok)return r.json();}catch(_){}
  for(let i=0;i<PROXIES.length;i++){
    const idx=(S.pIdx+i)%PROXIES.length;
    try{const r=await ft(PROXIES[idx](url),7000);if(r.ok){S.pIdx=idx;return r.json();}}catch(_){}
  }
  throw new Error('no conn');
}

// ── LOAD SYMBOLS ─────────────────────────────────────────────────────────────
async function loadSymbols(){
  conn('scan');
  try{
    const d=await api('/api/v1/contract/detail');
    if(d?.success&&d.data?.length){
      S.symbols=d.data.filter(s=>s.state===0&&s.quoteCoin==='USDT').map(s=>s.symbol);
      document.getElementById('cTot').textContent=S.symbols.length;
      return true;
    }
  }catch(_){}
  conn('err');
  document.getElementById('tb').innerHTML=`<tr><td colspan="4"><div class="ph"><div class="i">⚠️</div>
    <p><b>Ошибка подключения к MEXC</b><br/><br/>
    Возможные причины:<br/>— MEXC заблокирован в вашей стране<br/>— Нет интернета<br/>— Прокси перегружены<br/><br/>
    Попробуйте через VPN или повторите через минуту.</p></div></td></tr>`;
  return false;
}

// ── FETCH DATA ────────────────────────────────────────────────────────────────
async function getTicker(sym){
  try{
    const d=await api(`/api/v1/contract/ticker?symbol=${sym}`);
    if(!d?.success||!d.data)return null;
    return{price:parseFloat(d.data.lastPrice)||0,ch:(parseFloat(d.data.riseFallRate)||0)*100,v24:parseFloat(d.data.volume24)||0};
  }catch(_){return null;}
}
async function getKline(sym,min){
  try{
    const e=Math.floor(Date.now()/1000),s=e-min*60;
    const d=await api(`/api/v1/contract/kline/${sym}?interval=Min1&start=${s}&end=${e}`);
    if(!d?.success||!d.data?.vol)return null;
    const n=Math.min(min,d.data.vol.length);
    const amt=(d.data.amount||[]).slice(-n).reduce((a,b)=>a+b,0);
    const price=d.data.close?.at(-1)||0;
    return{amt,price};
  }catch(_){return null;}
}
async function getTrades(sym,min){
  try{
    const d=await api(`/api/v1/contract/deals/${sym}?limit=500`);
    if(!d?.success||!d.data?.dataList)return 0;
    const cut=Date.now()-min*60000;
    return d.data.dataList.filter(t=>t.t>cut).length;
  }catch(_){return 0;}
}

// ── SCAN ONE ─────────────────────────────────────────────────────────────────
async function scanOne(sym){
  const tfT=+document.getElementById('tfT').value;
  const tfV=+document.getElementById('tfV').value;
  const same=tfT===tfV;
  const[ticker,kT,kV,trades]=await Promise.all([
    getTicker(sym),
    getKline(sym,tfT),
    same?Promise.resolve(null):getKline(sym,tfV),
    getTrades(sym,tfT),
  ]);
  if(!ticker)return;
  const prev=S.data[sym];
  S.data[sym]={
    sym,price:kT?.price||ticker.price,
    ch:ticker.ch,v24:ticker.v24,
    trades,amt:(same?kT:kV)?.amt||kT?.amt||0,
    tfT,tfV,prevPrice:prev?.price,ts:Date.now(),
  };
}

// ── FULL SCAN ─────────────────────────────────────────────────────────────────
async function runScan(){
  if(!S.on)return;
  conn('scan');
  const syms=S.symbols.slice(0,80);
  for(let i=0;i<syms.length;i+=6){
    if(!S.on)return;
    await Promise.all(syms.slice(i,i+6).map(s=>scanOne(s)));
    render();
    await new Promise(r=>setTimeout(r,350));
  }
  conn('ok');
  toast('✓ Обновлено — '+new Date().toLocaleTimeString('ru'));
}

function startCD(){
  clearInterval(S.cdT);S.cd=TICK;
  const f=document.getElementById('cf');
  f.style.width='100%';
  S.cdT=setInterval(()=>{
    S.cd--;
    f.style.width=(S.cd/TICK*100)+'%';
    if(S.cd<=0){clearInterval(S.cdT);runScan().then(()=>{if(S.on)startCD();});}
  },1000);
}

async function toggleScan(){
  if(S.on){
    S.on=false;clearInterval(S.cdT);
    document.getElementById('cf').style.width='0%';
    document.getElementById('btnS').textContent='▶ Запустить сканер';
    document.getElementById('btnS').classList.remove('stop');
    conn('');return;
  }
  S.on=true;
  document.getElementById('btnS').textContent='⏹ Остановить';
  document.getElementById('btnS').classList.add('stop');
  document.getElementById('tb').innerHTML=`<tr><td colspan="4" style="text-align:center;padding:50px;color:var(--muted)"><span class="sp"></span>Загрузка монет...</td></tr>`;
  const ok=await loadSymbols();
  if(!ok){S.on=false;document.getElementById('btnS').textContent='▶ Запустить сканер';document.getElementById('btnS').classList.remove('stop');return;}
  await runScan();
  if(S.on)startCD();
}

// ── SORT ─────────────────────────────────────────────────────────────────────
function sort(k){
  if(S.sKey===k)S.sDir*=-1;else{S.sKey=k;S.sDir=-1;}
  ['sym','trades','volume','change'].forEach(x=>{
    const th=document.getElementById('th-'+x);
    if(th){th.className=x===k?'s':'';th.textContent=({sym:'Монета',trades:'Сделки',volume:'Оборот $',change:'Изм 24%'})[x]+(x===k?(S.sDir===-1?' ↓':' ↑'):'');}
  });
  render();
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const minT=+document.getElementById('minT').value||0;
  const minV=(+document.getElementById('minV').value||0)*1000;
  let rows=Object.values(S.data).filter(d=>d.trades>=minT&&d.amt>=minV);
  const fns={
    sym:(a,b)=>a.sym.localeCompare(b.sym)*S.sDir,
    trades:(a,b)=>(a.trades-b.trades)*S.sDir,
    volume:(a,b)=>(a.amt-b.amt)*S.sDir,
    change:(a,b)=>(Math.abs(a.ch)-Math.abs(b.ch))*S.sDir,
  };
  rows.sort(fns[S.sKey]||fns.trades);
  document.getElementById('cFnd').textContent=rows.length;
  const tb=document.getElementById('tb');
  if(!rows.length){
    tb.innerHTML=`<tr><td colspan="4"><div class="ph"><div class="i">🔍</div><p>Нет монет по заданным фильтрам.<br/>Попробуйте снизить минимальные значения.</p></div></td></tr>`;
    return;
  }
  // save scroll
  const sw=document.querySelector('.tw');
  const sy=sw.scrollTop;
  tb.innerHTML=rows.map(d=>{
    const nm=d.sym.replace('_USDT','');
    const cc=d.ch>0?'pos':d.ch<0?'neg':'neu';
    const cs=d.ch>0?'+':'';
    const hc=d.trades>150||d.amt>500000?'#f85149':d.trades>60||d.amt>100000?'#d29922':'#3fb950';
    return`<tr onclick="showDetail('${d.sym}')">
      <td><span class="hdot" style="background:${hc}"></span><span class="sym">${nm}</span><span class="su">_USDT</span></td>
      <td><b>${d.trades}</b></td>
      <td>${fmt(d.amt)}</td>
      <td class="${cc}">${cs}${d.ch.toFixed(2)}%</td>
    </tr>`;
  }).join('');
  sw.scrollTop=sy;
  // flash
  rows.forEach(d=>{
    if(d.prevPrice==null)return;
    const all=tb.querySelectorAll('tr');
    all.forEach(tr=>{
      const s=tr.querySelector('.sym');
      if(!s||s.textContent+'_USDT'!==d.sym)return;
      const c=d.price>d.prevPrice?'fg':d.price<d.prevPrice?'fr2':null;
      if(c){tr.classList.add(c);setTimeout(()=>tr.classList.remove(c),600);}
    });
  });
}

// ── DETAIL ───────────────────────────────────────────────────────────────────
function showDetail(sym){
  const d=S.data[sym];if(!d)return;
  document.getElementById('shSym').textContent=sym.replace('_USDT','')+' / USDT PERP';
  const cc=d.ch>=0?'pos':'neg';
  document.getElementById('shGrid').innerHTML=[
    ['Цена',fmtP(d.price)],
    [`Сделок (${d.tfT}м)`,d.trades],
    [`Оборот (${d.tfV}м)`,'$'+fmt(d.amt)],
    ['Изм. 24ч',`<span class="${cc}">${d.ch>=0?'+':''}${d.ch.toFixed(2)}%</span>`],
    ['Объём 24ч',fmt(d.v24)+' контр'],
    ['Обновлено',new Date(d.ts).toLocaleTimeString('ru')],
  ].map(([l,v])=>`<div class="si"><div class="sl">${l}</div><div class="sv">${v}</div></div>`).join('');
  document.getElementById('ov').classList.add('open');
}
function closeSheet(e){
  if(!e||e.target===document.getElementById('ov'))
    document.getElementById('ov').classList.remove('open');
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
